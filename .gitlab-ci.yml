variables:
  GIT_DEPTH: 0

stages:
  - deploy

deploy_to_tomcloud_lab:
  stage: deploy
  
  # This tag must match the tag you give your GitLab Runner when you register it.
  # It tells GitLab to run this job on YOUR specific server.
  tags:
    - production
    
  # Only run this deployment if changes happen on the 'main' branch
  # AND only if files inside 'labs/' or 'vpn-api/' were changed.
  only:
    refs:
      - master
    changes:
      - ".gitlab-ci.yml"
      - "labs/**/*"
      - "vpn-api/**/*"
      - "opt/**/*"
      - "session.json"
      - "init-services.sh"
      - "entrypoint.sh"
  script:
    - echo "Starting deployment to TomCloudLab..."
    
    # 0. Generate version file based on current commit and tags
    - git describe --tags --always > labs/.version
    
    # 1. Sync the 'labs' folder. 
    # We exclude 'vendor' and 'node_modules' so production dependencies stay safe.
    - rsync -av --delete --exclude 'vendor' --exclude 'node_modules' labs/ /Users/sathish/Downloads/TomCloudLab/labs/
    
    # 2. Sync the 'vpn-api' folder.
    - rsync -av --delete --exclude 'vendor' --exclude 'node_modules' vpn-api/ /Users/sathish/Downloads/TomCloudLab/vpn-api/
    
    # 3. Sync the 'opt' folder (Labs Control Panel & Orchestrators)
    # We exclude 'labs-control-panel/config.json' so rsync doesn't delete the production config
    - rsync -av --delete --exclude 'labs-control-panel/config.json' opt/ /Users/sathish/Downloads/TomCloudLab/opt/
    
    # 4. Sync the 'session.json' configuration
    - cp session.json /Users/sathish/Downloads/TomCloudLab/session.json
    
    # 5. Sync the startup scripts to ensure environments are identical
    - cp init-services.sh /Users/sathish/Downloads/TomCloudLab/init-services.sh
    - cp entrypoint.sh /Users/sathish/Downloads/TomCloudLab/entrypoint.sh
    
    - echo "Deployment of labs, vpn-api, and opt completed successfully!"
