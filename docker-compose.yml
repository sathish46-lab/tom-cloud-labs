services:
  vps_dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docker_tomlabs_vps_dev
    privileged: true
    environment:
      - MAIN_DOMAIN=dev.awshosting.in
      - VPN_DOMAIN=vpn.dev.awshosting.in
      - MQS_DOMAIN=mq.dev.awshosting.in
      - CODE_DOMAIN=code.dev.awshosting.in
      - WORK_DOMAIN=work.dev.awshosting.in
      - SSL_EMAIL=admin@example.com
      - DOCKER_HOST=unix:///var/docker.sock
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - .:/host_www
      - /var/run/docker.sock:/var/docker.sock
      - ./labs:/var/www/labs
      - ./vpn-api:/var/www/vpn-api
      - ./work:/var/www/work
      - ./env.json:/var/www/env.json
      - ./consume_all.py:/var/www/consume_all.py
      - ./publish_test.py:/var/www/publish_test.py
      - ./opt/labs-control-panel:/opt/labs-control-panel
      # ⬇️ NEW PERSISTENT VOLUMES ⬇️
      - ./rabbitmq-data:/var/lib/rabbitmq
      - ./wireguard-conf:/etc/wireguard
      - ./apache-logs:/var/log/apache2
      - ./traefik-conf:/etc/traefik
    networks:
      - docker_tomlabs_net
      - tomlabs_net
    ports:
      - "8080:80"
      - "8443:443"
      - "9081:8081"
      - "9082:8082"
      - "5673:5672"
      - "15673:15672"
      - "51821:51820/udp"
    stop_signal: SIGRTMIN+3

  mongodb:
    image: mongo:8.0
    container_name: docker_tomlabs_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: Tombootroot
    volumes:
      - ./mongo-data:/data/db
    networks:
      - docker_tomlabs_net
    ports:
      - "27018:27017"
    restart: always



